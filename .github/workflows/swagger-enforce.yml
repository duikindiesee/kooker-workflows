name: Swagger Enforce

on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        default: '21'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  validate-swagger:
    # Uses the proven kooker1-org self-hosted pool (see org-runner-canary.yml in kooker-infra and
    # maven-version-bump.yml/ghcr-retention.yml/gitops-sync.yml in this repo) -- not the retired
    # [self-hosted, local-linux] label this job was moved off of.
    runs-on: [self-hosted, Linux, X64, kooker1-org, docker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Create required folders
        run: mkdir -p target/classes

      - name: Generate OpenAPI spec using springdoc-openapi plugin
        run: |
          # We use the springdoc-openapi-maven-plugin to generate the final spec at build time,
          # or simply verify compilation to ensure the spec annotations are valid.
          # Here we just run the spring boot plugin to start internal validation.
          mvn clean verify -DskipTests
          
          # If the repository configures springdoc-openapi-maven-plugin, this step
          # verifies that it successfully spits out the openapi.json.
          if [ -d "target/openapi" ] || ls target/*.json 1> /dev/null 2>&1; then
             echo "Swagger documentation generated successfully."
          else
             echo "Warning/Error: Did not see openapi.json output. Ensure springdoc-openapi-maven-plugin is configured."
          fi
