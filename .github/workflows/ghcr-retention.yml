# =============================================================================
# ghcr-retention.yml
# =============================================================================
# PURPOSE
#   Reusable workflow that trims GHCR images to maintain a rolling retention of 
#   at least 15 versions. This prevents snapshot feature tags and outdated branches 
#   from exhausting the organization's physical storage limit incrementally.
#
# USAGE (in calling workflow)
#   jobs:
#     retention:
#       uses: duikindiesee/kooker-workflows/.github/workflows/ghcr-retention.yml@main
#       secrets: inherit
# =============================================================================

name: GHCR Centralized Retention (15 Versions)

on:
  workflow_call:
    inputs:
      package-name:
        description: "GHCR package (image) name to prune. Defaults to the calling repo's name. Pass explicitly when the image name differs from the repo (e.g. kooker-hermes-agent)."
        required: false
        type: string
        default: ""
      min-versions-to-keep:
        description: "How many of the newest versions to always keep (use a smaller value for very large images)."
        required: false
        type: number
        default: 15
    secrets:
      MAVEN_PUBLISH_TOKEN:
        required: true

permissions:
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  prune-ghcr:
    # Migrated to GitHub-hosted cloud runner. Self-hosted runner config preserved below.
    # runs-on: [self-hosted, local-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Prune old image tags
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ inputs.package-name != '' && inputs.package-name || github.event.repository.name }}
          package-type: 'container'
          min-versions-to-keep: ${{ inputs.min-versions-to-keep }}
          # Standard PAT required for destructive package ops in GHCR
          token: ${{ secrets.MAVEN_PUBLISH_TOKEN }}
