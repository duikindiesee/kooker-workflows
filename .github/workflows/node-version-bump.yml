# =============================================================================
# node-version-bump.yml  (v1.5.7)
# =============================================================================
# PURPOSE
#   Reusable workflow that automatically bumps the npm package.json version on
#   every merge to main. Used by all Node/frontend services:
#     - kooker-pacman
#     - kooker-web
#     - sportifine-v2
#     - kooker-api-specs
#
# VERSIONING SCHEME
#   Follows standard SemVer 2.0.0: MAJOR.MINOR.PATCH
#   Every non-release merge to main triggers at minimum a PATCH bump.
#
# BUMP RULES (Conventional Commits)
#   Commit prefix      → Bump type → Example
#   ────────────────── ─────────── ──────────────────────
#   feat!: / BREAKING  → MAJOR     →  1.0.3 → 2.0.0
#   feat:              → MINOR     →  1.0.3 → 1.1.0
#   fix: / any other   → PATCH     →  1.0.3 → 1.0.4
#
# BRANCH PROTECTION COMPATIBLE (v1.5.6)
#   Cannot push directly to main — branch protection requires a PR.
#   Flow:
#     1. Feature PR merges → version-bump creates chore/bump-X.Y.Z PR
#     2. Bump PR auto-merges once quality checks pass
#     3. Second pipeline run hits loop guard → skips bump → Docker build runs
#        with new version from package.json
#
# LOOP PREVENTION
#   Bump PRs use "chore(release):" prefix. On the second run (after bump PR
#   merges), the loop guard detects this prefix and skips bumping. The Docker
#   build still runs with the already-bumped version.
#
# USAGE (in calling workflow)
#   jobs:
#     version-bump:
#       if: github.event_name == 'push' && github.ref == 'refs/heads/main'
#       uses: duikindiesee/kooker-workflows/.github/workflows/node-version-bump.yml@main
#       secrets: inherit
#
#     build-and-push:
#       needs: version-bump
#       # use: needs.version-bump.outputs.new-version for Docker tag
#
# REQUIRED SECRETS
#   GITHUB_TOKEN — standard token with contents: write, pull-requests: write
# =============================================================================

name: Node Version Bump (Conventional Commits)

on:
  workflow_call:
    outputs:
      new-version:
        description: "The package.json version after the bump (or unchanged if skipped)"
        value: ${{ jobs.bump.outputs.new-version }}
      bumped:
        description: "'true' if a version bump PR was created, 'false' otherwise"
        value: ${{ jobs.bump.outputs.bumped }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  bump:
    runs-on: [self-hosted, Linux, X64, kooker1-org, docker]
    permissions:
      contents: write
      pull-requests: write

    outputs:
      new-version: ${{ steps.bump.outputs.new-version }}
      bumped:      ${{ steps.bump.outputs.bumped }}

    steps:
      - name: Checkout (full history for push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GITHUB_TOKEN is fine for checkout. The branch push that needs the PAT
          # happens in the create-pull-request step below, which uses
          # MAVEN_PUBLISH_TOKEN so the bump PR triggers downstream CI.
          # NOTE: MAVEN_PUBLISH_TOKEN must be a non-expired PAT with repo+workflow
          # scope (the "Maven package publish" PAT) or the PR push fails on cloud
          # runners with "could not read Username". The old self-hosted runners
          # masked an expired token via ambient host git credentials.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Detect bump type and write version to package.json
        id: bump
        run: |
          set -euo pipefail
          COMMIT_SUBJECT="$(printf '%s' "${COMMIT_MSG}" | sed -n '1p')"
          printf '=== Commit: %s\n' "${COMMIT_SUBJECT}"

          # ──────────────────────────────────────────────────────────────────
          # LOOP GUARD
          # If this commit is a release bump PR merge, skip bumping entirely.
          # The build job will still run with the bumped version on main.
          # ──────────────────────────────────────────────────────────────────
          if echo "$COMMIT_MSG" | grep -qE "^chore\(release\):"; then
            echo "Release commit detected — skipping bump to prevent infinite loop."
            CURRENT=$(node -p "require('./package.json').version")
            echo "new-version=${CURRENT}" >> $GITHUB_OUTPUT
            echo "bumped=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ──────────────────────────────────────────────────────────────────
          # READ CURRENT VERSION from package.json
          # ──────────────────────────────────────────────────────────────────
          CURRENT=$(node -p "require('./package.json').version")
          if [ -z "$CURRENT" ]; then
            echo "ERROR: Could not read version from package.json" >&2
            exit 1
          fi
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          echo "Current version: ${CURRENT}"

          # ──────────────────────────────────────────────────────────────────
          # DETERMINE BUMP TYPE from Conventional Commit prefix.
          # Default to PATCH for any non-release merge (every merge bumps).
          # ──────────────────────────────────────────────────────────────────
          BUMP_TYPE="patch"
          if echo "$COMMIT_MSG" | grep -qiE "(^feat!|^feat\([^)]+\)!|BREAKING CHANGE)"; then
            BUMP_TYPE="major"
          elif echo "$COMMIT_MSG" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP_TYPE="minor"
          fi

          # ──────────────────────────────────────────────────────────────────
          # CALCULATE NEW VERSION
          # ──────────────────────────────────────────────────────────────────
          case $BUMP_TYPE in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: ${NEW_VERSION}  bump: ${BUMP_TYPE}"

          # ──────────────────────────────────────────────────────────────────
          # SKIP ALREADY-CUT VERSIONS (self-heal from version drift)
          # A bump PR can stall on failing CI, leaving package.json behind while
          # its release tag was already created eagerly below. Without this guard
          # every later merge recomputes the SAME version and "gh release create"
          # fails on the existing tag, jamming the whole pipeline (the 0.17.0 and
          # 0.22.6 incidents). Advance the patch until the version tag is free.
          # ──────────────────────────────────────────────────────────────────
          git fetch --tags --force --quiet || true
          while git rev-parse -q --verify "refs/tags/v${NEW_VERSION}" >/dev/null 2>&1; do
            echo "Tag v${NEW_VERSION} already exists; advancing patch."
            PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          done
          echo "Resolved free version: ${NEW_VERSION}"

          # ──────────────────────────────────────────────────────────────────
          # WRITE NEW VERSION to package.json
          # ──────────────────────────────────────────────────────────────────
          npm version "${NEW_VERSION}" --no-git-tag-version --allow-same-version

          # ──────────────────────────────────────────────────────────────────
          # PRETTIER FORMATTING (Format-on-Merge Strategy)
          # ──────────────────────────────────────────────────────────────────
          echo "Auto-formatting tracked source files using Prettier..."
          FORMAT_TARGETS="$(git ls-files '*.js' '*.jsx' '*.ts' '*.tsx' '*.mjs' '*.cjs' '*.json' '*.yml' '*.yaml' '*.md' '*.css' '*.scss' 2>/dev/null || true)"
          if [ -n "${FORMAT_TARGETS}" ]; then
            npm exec --yes --package prettier@3.3.3 prettier -- --write ${FORMAT_TARGETS} --ignore-path .gitignore
          else
            echo "No tracked files matched Prettier patterns; skipping formatting."
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json 2>/dev/null || git add package.json
          # Also stage any modified tracked files (including those formatted by Prettier)
          git add -u
          git commit -m "chore(release): bump to ${NEW_VERSION} and format code"

          echo "new-version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "bumped=true" >> $GITHUB_OUTPUT
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ────────────────────────────────────────────────────────────────────────
      # CREATE PR for the bump commit (branch-protection compatible)
      # The PR auto-merges once quality checks pass → second pipeline run →
      # loop guard skips bump → Docker build runs with new version.
      # ────────────────────────────────────────────────────────────────────────
      - name: Create version-bump pull request
        id: create-pr
        if: steps.bump.outputs.bumped == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          # MUST use a PAT here — GITHUB_TOKEN commits do NOT trigger workflow
          # runs on the created branch (GitHub loop-prevention). Without CI running
          # on the bump PR, auto-merge can never fire.
          token: ${{ secrets.MAVEN_PUBLISH_TOKEN }}
          branch: "chore/bump-${{ steps.bump.outputs.new-version }}"
          title: "chore(release): bump to ${{ steps.bump.outputs.new-version }}"
          body: |
            Automated version bump to `${{ steps.bump.outputs.new-version }}`.

            Created automatically by the CI pipeline.
            Will auto-merge once status checks pass.
          labels: "automated,version-bump"
          delete-branch: true


      - name: Enable auto-merge on bump PR
        if: steps.create-pr.outputs.pull-request-number != ''
        run: |
          OUTPUT=$(gh pr merge "${{ steps.create-pr.outputs.pull-request-number }}" \
            --auto --squash \
            --repo "${GITHUB_REPOSITORY}" 2>&1) && {
            echo "Auto-merge enabled on PR #${{ steps.create-pr.outputs.pull-request-number }}"
          } || {
            if echo "$OUTPUT" | grep -q "Protected branch rules not configured"; then
              echo "::warning::Auto-merge skipped — no branch protection rules configured. Bump PR must be merged manually."
            else
              echo "::error::Auto-merge failed unexpectedly: $OUTPUT"
              exit 1
            fi
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ──────────────────────────────────────────────────────────────────────
      # APPROVE the bump PR with a SEPARATE identity so the armed auto-merge can
      # complete under the main branch ruleset (which requires one non-author
      # approval). Without this the bump PR stalls REVIEW_REQUIRED, package.json
      # never advances, and every later merge recomputes a new version, so the
      # bumps pile up and consecutive ones conflict. The PR is authored by
      # MAVEN_PUBLISH_TOKEN; GITOPS_APPROVER_TOKEN is a different account, so its
      # review satisfies the rule. Mirrors the maven twin (#47) and gitops-sync.
      # ──────────────────────────────────────────────────────────────────────
      - name: Approve bump PR (separate approver identity)
        if: steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITOPS_APPROVER_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::GITOPS_APPROVER_TOKEN is not set. Bump PR #${{ steps.create-pr.outputs.pull-request-number }} opened but cannot be approved; it will stall under branch protection and the bumps will pile up."
            exit 1
          fi
          gh pr review "${{ steps.create-pr.outputs.pull-request-number }}" \
            --approve \
            --repo "${GITHUB_REPOSITORY}" \
            --body "Automated version bump. Approved by the separate approver identity so the armed auto-merge can complete under branch protection."

      - name: Create GitHub Release
        if: steps.bump.outputs.bumped == 'true'
        run: |
          # Idempotent: the skip-existing-tags guard above already resolves a free
          # version, but re-check here so a rare race never fails the release step.
          if gh release view "v${{ steps.bump.outputs.new-version }}" >/dev/null 2>&1; then
            echo "::warning::Release v${{ steps.bump.outputs.new-version }} already exists; skipping creation."
          else
            gh release create "v${{ steps.bump.outputs.new-version }}" \
              --title "Release v${{ steps.bump.outputs.new-version }}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
